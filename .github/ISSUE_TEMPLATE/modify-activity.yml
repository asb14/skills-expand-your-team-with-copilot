name: Modify Existing Activity
description: Request changes to an existing extracurricular activity
title: "[MODIFY ACTIVITY] Update "
labels: ["enhancement", "activity-modification"]
assignees:
  - Copilot
body:
  - type: markdown
    attributes:
      value: |
        ## Modify Existing Activity Request
        
        Use this form to request changes to an existing extracurricular activity in the Mergington High School system.
        
        **Please fill out all required fields** - this helps our Copilot coding agent implement your request without needing additional clarification.

  - type: dropdown
    id: activity-name
    attributes:
      label: Which Activity Needs Changes?
      description: Select the activity you want to modify
      options:
        - Chess Club
        - Programming Class
        - Morning Fitness
        - Soccer Team
        - Basketball Team
        - Art Club
        - Drama Club
        - Math Club
        - Debate Team
        - Weekend Robotics Workshop
        - Manga Maniacs
        - Other (specify in description)
    validations:
      required: true

  - type: checkboxes
    id: changes-needed
    attributes:
      label: What Changes Are Needed?
      description: Select all changes that need to be made
      options:
        - label: Change meeting schedule (days/times)
        - label: Update activity description
        - label: Change maximum number of participants
        - label: Update teacher sponsor information
        - label: Other changes (describe below)

  - type: textarea
    id: new-description
    attributes:
      label: New Activity Description
      description: If updating the description, provide the new text here
      placeholder: "e.g., Updated Chess Club description with new tournament information..."
    validations:
      required: false

  - type: input
    id: new-schedule-days
    attributes:
      label: New Meeting Days
      description: If changing schedule, which days should the activity meet?
      placeholder: "e.g., Mondays and Wednesdays, Fridays, Tuesday and Thursday"
    validations:
      required: false

  - type: input
    id: new-schedule-time
    attributes:
      label: New Meeting Time
      description: If changing schedule, what time should the activity run?
      placeholder: "e.g., 3:15 PM - 5:00 PM, 7:00 AM - 8:00 AM"
    validations:
      required: false

  - type: input
    id: new-max-participants
    attributes:
      label: New Maximum Participants
      description: If changing capacity, how many students should be able to participate?
      placeholder: "e.g., 15, 20, 25"
    validations:
      required: false

  - type: textarea
    id: reason-for-change
    attributes:
      label: Reason for Changes
      description: Why are these changes needed?
      placeholder: "e.g., Room availability changed, more students interested, teacher schedule conflict..."
    validations:
      required: true

  - type: textarea
    id: other-changes
    attributes:
      label: Other Changes Needed
      description: Describe any other changes not covered above
      placeholder: "e.g., Add special equipment requirements, change meeting location..."
    validations:
      required: false

  - type: checkboxes
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: The following items will be completed when this activity is modified
      options:
        - label: Activity information is updated in the system
          required: true
        - label: Changes are visible on the website
          required: true
        - label: Student registration still works correctly
          required: true
        - label: Schedule displays the new information
          required: true
        - label: No existing student registrations are lost
          required: true

  - type: markdown
    attributes:
      value: |
        ## Implementation Notes for Copilot Agent
        
        **Technical Context:**
        - Activities are stored in the `initial_activities` dictionary in `src/backend/database.py`
        - Modify the existing activity entry with the requested changes
        - Preserve existing `participants` array to avoid losing student registrations
        - Update schedule_details format: `{"days": ["Monday", "Wednesday"], "start_time": "15:15", "end_time": "17:00"}`
        - Time format is 24-hour format (e.g., "15:15" for 3:15 PM)
        - The system will load changes when the server restarts
        
        **Files to modify:**
        - `src/backend/database.py` - Update existing activity in `initial_activities` dictionary
        
        **Important:**
        - Do NOT remove or modify the `participants` array unless specifically requested
        - Ensure schedule_details are properly formatted for the filtering system
        
        **Testing:**
        - Verify changes appear on website at `http://localhost:8000`
        - Test that existing student registrations are preserved
        - Confirm new schedule/information displays correctly