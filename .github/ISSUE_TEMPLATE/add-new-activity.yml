name: Add New Activity
description: Request to add a new extracurricular activity to the system
title: "[NEW ACTIVITY] Add "
labels: ["enhancement", "new-activity"]
assignees:
  - Copilot
body:
  - type: markdown
    attributes:
      value: |
        ## Add New Activity Request
        
        Use this form to request adding a new extracurricular activity to the Mergington High School system.
        
        **Please fill out all required fields** - this helps our Copilot coding agent implement your request without needing additional clarification.

  - type: input
    id: activity-name
    attributes:
      label: Activity Name
      description: What is the name of the new activity?
      placeholder: "e.g., Photography Club, Science Olympiad, Book Club"
    validations:
      required: true

  - type: textarea
    id: activity-description
    attributes:
      label: Activity Description
      description: Provide a clear description of what this activity involves
      placeholder: "e.g., Learn photography techniques, explore nature photography, and participate in photo competitions. Students will develop skills in composition, lighting, and digital editing."
    validations:
      required: true

  - type: input
    id: schedule-days
    attributes:
      label: Meeting Days
      description: Which days of the week will this activity meet?
      placeholder: "e.g., Mondays and Wednesdays, Fridays, Tuesday and Thursday"
    validations:
      required: true

  - type: input
    id: schedule-time
    attributes:
      label: Meeting Time
      description: What time will the activity run?
      placeholder: "e.g., 3:15 PM - 5:00 PM, 7:00 AM - 8:00 AM"
    validations:
      required: true

  - type: input
    id: max-participants
    attributes:
      label: Maximum Participants
      description: How many students can participate in this activity?
      placeholder: "e.g., 15, 20, 25"
    validations:
      required: true

  - type: input
    id: teacher-sponsor
    attributes:
      label: Teacher Sponsor
      description: Which teacher will sponsor/supervise this activity?
      placeholder: "e.g., Ms. Rodriguez, Mr. Chen"
    validations:
      required: true

  - type: textarea
    id: special-requirements
    attributes:
      label: Special Requirements or Equipment
      description: Does this activity need special equipment, rooms, or other requirements?
      placeholder: "e.g., Computer lab access, Art supplies, Outdoor space, Transportation"
    validations:
      required: false

  - type: checkboxes
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: The following items will be completed when this activity is added
      options:
        - label: Activity appears in the activities list on the website
          required: true
        - label: Students can register for the activity
          required: true
        - label: Activity shows correct schedule and meeting times
          required: true
        - label: Activity has proper participant limit enforcement
          required: true
        - label: Teacher can manage student registrations
          required: true

  - type: markdown
    attributes:
      value: |
        ## Implementation Notes for Copilot Agent
        
        **Technical Context:**
        - Activities are stored in the `initial_activities` dictionary in `src/backend/database.py`
        - Each activity needs: name, description, schedule (human-readable), schedule_details (structured), max_participants, and empty participants list
        - Schedule details format: `{"days": ["Monday", "Wednesday"], "start_time": "15:15", "end_time": "17:00"}`
        - Time format is 24-hour format (e.g., "15:15" for 3:15 PM)
        - The system will automatically initialize the activity when the server restarts
        
        **Files to modify:**
        - `src/backend/database.py` - Add new activity to `initial_activities` dictionary
        
        **Testing:**
        - Verify activity appears on website at `http://localhost:8000`
        - Test student registration functionality
        - Confirm schedule displays correctly